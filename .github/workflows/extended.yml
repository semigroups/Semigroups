name: "Extended tests"
on:
  workflow_dispatch:
  push:
    branches:
      - rc-v*
  pull_request:
    paths:
      - ".VERSION"
      - ".github/workflows/extended.yml"
  schedule:
    # Every day at 2:30 AM UTC
    - cron: 30 2 * * *

concurrency:
  # Group by workflow and ref; the last component ensures that for pull requests
  # we limit to one concurrent job, but for the main/stable branches we don't
  group: ${{ github.workflow }}-${{ github.ref }}-${{ (github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/stable-')) || github.run_number }}
  # Only cancel intermediate pull request builds
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  extended:
    name: "${{ matrix.os }} / GAP ${{ matrix.gap-version }}"
    runs-on: "${{ matrix.os }}-latest"
    strategy:
      fail-fast: false
      matrix:
        os:
          - Ubuntu
          - macOS
        gap-version:
          - master

    steps:
      - uses: actions/checkout@v6
      - name: "Install macOS dependencies"
        if: ${{ runner.os == 'macOS' }}
        run: brew install automake libtool
      - name: "Setup ccache"
        if: ${{ runner.os != 'Windows' }}
        uses: Chocobo1/setup-ccache-action@v1
        with:
          update_packager_index: false
          override_cache_key: ${{ runner.os }}-${{ matrix.gap-version }}-${{ github.ref }}
          override_cache_key_fallback: ${{ runner.os }}-${{ matrix.gap-version }}
      - name: "Install GAP"
        uses: gap-actions/setup-gap@v3
        with:
          gap-version: ${{ matrix.gap-version }}
      - name: "Build Semigroups"
        uses: gap-actions/build-pkg@v3
        with:
          configflags: --disable-hpcombi
      - name: "Run GAP's tst/teststandard.g"
        uses: gap-actions/run-pkg-tests@v4
        with:
          testfile: "ci/run-gap-teststandard.g"
      - name: "Run GAP's tst/testbugfix.g"
        uses: gap-actions/run-pkg-tests@v4
        with:
          testfile: "ci/run-gap-testbugfix.g"
